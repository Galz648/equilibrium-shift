name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Change to your default branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest # Or a specific version like 1.1.0

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      # Pages / GitHub APIs need GITHUB_TOKEN + OIDC; act does not provide these.
      - name: Setup Pages
        uses: actions/configure-pages@v4
        if: ${{ !env.ACT }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        if: ${{ !env.ACT }}
        with:
          path: "./dist" # The folder where your build output is located

  # Job-level `if: ${{ !env.ACT }}` is invalid for act's YAML schema ("Unknown Variable Access env").
  # Skip the deploy step locally; use: ACT=true act --job build
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        if: ${{ !env.ACT }}
        uses: actions/deploy-pages@v4
