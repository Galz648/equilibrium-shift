<html>

<head>
    <style>
        .container {
            display: flex;
            flex-direction: row;
            height: 100vh;
        }

        .panel {
            flex: 1;
            border-right: 1px solid #ccc;
            padding: 1em;
            box-sizing: border-box;
        }

        .panel:last-child {
            border-right: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="panel" id="reactor">
            <label for="temperature-gauge">Temperature: </label>
            <p>
                N<sub>2</sub>(g) + 3 H<sub>2</sub>(g)
                &#8652; 2 NH<sub>3</sub>(g)
            </p>
            <small>
                (Ammonia synthesis: exothermic, reversible, equilibrium reaction)
            </small>
            <h1 id="temperature-gauge">0</h1>
            <p id="H2"> </p>
            <p id="N2"> </p>
            <p id="NH3"> </p>
            <!-- <canvas></canvas>
            <div class="controls">...</div> -->
        </div>
        <div class="panel" id="controls">
            <label for="heater-slider">Heat</label>
            <input id="heater-slider" type="range" min="0" max="100" value="50">
            <h1 id="clock"></h1>
            <h1 id="heater-value"></h1>
            <span id="value"></span>
            <!-- <canvas></canvas>
            <div class="controls">...</div> -->
        </div>
    </div>
    <script src="index.ts"></script>
</body>

</html>
